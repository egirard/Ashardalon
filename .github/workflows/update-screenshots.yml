name: Update E2E Screenshots

on:
  workflow_dispatch:
    inputs:
      grep:
        description: 'Optional test filter (e.g. "001" or "character-selection"). Leave empty to update all.'
        required: false
        default: ''

jobs:
  update-screenshots:
    name: Update screenshots (shard ${{ matrix.shardIndex }}/4)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2, 3, 4]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Update screenshots (filtered)
        if: github.event.inputs.grep != '' && matrix.shardIndex == 1
        run: bunx playwright test --update-snapshots --grep "${{ github.event.inputs.grep }}"
        continue-on-error: true

      - name: Update screenshots (full, sharded)
        if: github.event.inputs.grep == ''
        run: bunx playwright test --update-snapshots --shard="${{ matrix.shardIndex }}/4"
        continue-on-error: true

      - name: Upload updated screenshots as artifact
        uses: actions/upload-artifact@v4
        with:
          name: updated-screenshots-shard-${{ matrix.shardIndex }}
          path: e2e/**/**.spec.ts-snapshots/
          retention-days: 1
          if-no-files-found: ignore

  commit-screenshots:
    name: Commit updated screenshots
    runs-on: ubuntu-latest
    needs: update-screenshots
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Download all screenshot artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: updated-screenshots-shard-*
          merge-multiple: true
          path: .

      - name: Commit and push updated screenshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add 'e2e/**/*.spec.ts-snapshots/*.png'
          if git diff --cached --quiet; then
            echo "No screenshot changes to commit."
          else
            FILTER="${{ github.event.inputs.grep }}"
            if [ -n "$FILTER" ]; then
              MSG="chore: update e2e screenshots (filter: ${FILTER})"
            else
              MSG="chore: regenerate all e2e screenshots"
            fi
            git commit -m "$MSG"
            git push origin HEAD:${{ github.ref_name }}
            echo "✅ Screenshots committed and pushed."
          fi
